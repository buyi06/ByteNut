name: Bytenut 续期

on:
  schedule:
    - cron: '*/55 * * * *'  # 每 55 分钟（UTC）——注：cron 不能表达均匀的 55 分间隔，实际在每小时的 :00 与 :55 各跨一次，仅保证 ≤ 55 分钟必跨一次
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bytenut-renewal
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps (Xvfb + Chrome 依赖)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-liberation \
            libnss3 libxss1 libgbm1 \
            libasound2t64 || sudo apt-get install -y libasound2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run renewal
        env:
          BYTENUT:      ${{ secrets.BYTENUT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          # 注意：main.py 读的是 PROXY 这个变量名（不是 PROXY_NODE)
          # 直连留空即可；走代理请塹如 socks5://user:pass@host:port
          PROXY:        ${{ secrets.PROXY }}
        run: |
          python main.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7
